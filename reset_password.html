<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 | OHACSS 職業健康評鑑與合規支援系統</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
    
    <style>
        /* [統一風格] 確保 Body 滿版以支援 Flex 排版 */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* [統一風格] 背景漸層與置中設定 (與 index.html 完全一致) */
        .main-content {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            /* Flex 屬性達成垂直水平置中 */
            display: flex;
            align-items: center;
            justify-content: center;
            /* 扣除 Navbar(約56px) 與 Footer(約85px) 的高度，確保內容區塊填滿剩餘空間 */
            min-height: calc(100vh - 170px); 
            padding: 20px;
        }
        
        /* 狀態顯示區塊 */
        #auth-status {
            font-size: 0.9rem;
            margin-bottom: 15px; 
            padding: 10px; 
            border-radius: 5px; 
            text-align: center;
        }
        .status-waiting { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-ok { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .status-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c6cb; }
        
        /* Reset Card 樣式 */
        .reset-card {
            width: 100%;
            max-width: 450px; 
            border: none; 
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            background-color: #fff; 
            overflow: hidden;
        }
        .card-header {
            background-color: #17a2b8; /* 保留重設頁面的特殊識別色 */
            color: white; 
            padding: 2rem; 
            text-align: center; 
            border-bottom: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <div class="container-fluid d-flex justify-content-between align-items-center p-0">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                <i class="fas fa-shield-alt me-2"></i> OHACSS 職業健康評鑑與合規支援系統
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3 small" id="header-date"><i class="fas fa-spinner fa-spin"></i></span>
                <span class="text-white small border-start ps-3 border-secondary" id="header-clock" style="opacity: 0.9;">--:--</span>
            </div>
        </div>
    </nav>

    <div class="main-content">
    
        <div class="card reset-card">
            <div class="card-header">
                <h3 class="mb-0"><i class="fas fa-key me-2"></i>重設密碼</h3>
                <small class="opacity-75">請設定您的新登入密碼</small>
            </div>
            <div class="card-body p-4">
                
                <div id="auth-status" class="status-waiting">
                    <i class="fas fa-spinner fa-spin me-2"></i>正在驗證連結有效性...
                </div>

                <form id="resetForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">新密碼</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="new-password" placeholder="請輸入新密碼 (至少6碼)" required minlength="6" disabled>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">確認新密碼</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-circle text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="confirm-password" placeholder="請再次輸入新密碼" required minlength="6" disabled>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-info text-white w-100 fw-bold py-2" disabled>
                        <i class="fas fa-save me-2"></i>確認修改
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="mb-1">可信智慧整合有限公司 42917004</div>
        <div class="small opacity-75" style="font-family: 'Segoe UI', sans-serif; letter-spacing: 1px;">
            WesmartAI , Making Trust Transparent.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>

    <script>
        // 1. 初始化 Supabase
        if (typeof window.AppConfig === 'undefined') alert('錯誤：Config 未載入');
        
        const supabaseClient = window.supabase.createClient(
            window.AppConfig.Supabase.URL, 
            window.AppConfig.Supabase.KEY
        );

        // [統一功能] 頁首時鐘與日期邏輯
        document.addEventListener('DOMContentLoaded', function() {
            setInterval(() => {
                const el = document.getElementById('header-clock');
                if(el) el.textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
            }, 1000);
            
            const dateEl = document.getElementById('header-date');
            if(dateEl) {
                const now = new Date();
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                const formattedDate = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}(${days[now.getDay()]})`;
                dateEl.innerHTML = `<i class="far fa-calendar-alt me-1"></i>今日是 ${formattedDate}`;
            }
        });

        const statusEl = document.getElementById('auth-status');
        const submitBtn = document.getElementById('submit-btn');
        const input1 = document.getElementById('new-password');
        const input2 = document.getElementById('confirm-password');

        // 2. 嚴格檢查身分：監聽 Supabase Auth 狀態變化
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth Event:', event);
            
            if (session) {
                // 成功抓到使用者 session
                statusEl.className = 'status-ok';
                statusEl.innerHTML = `<i class="fas fa-user-check me-2"></i>正在為 <strong>${session.user.email}</strong> 重設密碼`;
                
                submitBtn.disabled = false;
                input1.disabled = false;
                input2.disabled = false;
            } else {
                // 沒有 Session
                setTimeout(async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if (!data.session) {
                        statusEl.className = 'status-error';
                        statusEl.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>連結已失效或過期，請重新發送重設信。`;
                    }
                }, 1000);
            }
        });

        // 3. 表單送出
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const p1 = input1.value;
            const p2 = input2.value;

            if (p1 !== p2) return alert('❌ 兩次密碼輸入不一致');

            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>更新中...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: p1 });
                if (error) throw error;

                alert('✅ 密碼更新成功！\n為確保安全，系統將自動登出，請使用「新密碼」重新登入。');
                
                await supabaseClient.auth.signOut();
                localStorage.clear(); 
                sessionStorage.clear();
                
                // 跳轉至 index.html
                window.location.href = 'https://wesmartai.net/OHACSS_Project/index.html';

            } catch (err) {
                console.error(err);
                
                // [強力修正] 轉成小寫並進行模糊比對，確保攔截成功
                let rawMsg = (err.message || "").toLowerCase();
                let displayMsg = err.message;

                // 只要包含 "different" 和 "old password" 就認定是該錯誤
                if (rawMsg.includes("different") && rawMsg.includes("old password")) {
                    displayMsg = "新密碼不能與舊密碼相同，請輸入其他密碼。";
                }

                alert('❌ 更新失敗: ' + displayMsg);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
